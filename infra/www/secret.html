<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script>
    const blockSize = 16
    const saltSize = 16
    const iterations = 1000000
    const keySize = 32

    async function init() {
      document.getElementById("salt").value = bytesToHexString(crypto.getRandomValues(new Uint8Array(saltSize)))
      document.getElementById("iv").value = bytesToHexString(crypto.getRandomValues(new Uint8Array(blockSize)))
    }

    async function onSubmit(event) {
      event.preventDefault();

      const result = document.getElementById("target-link")
      result.hidden = true;

      const html = (await createSecret()).replace(/\s+/g, ' ')

      result.href = URL.createObjectURL(new Blob([html], { 'type': 'text/html' }))
      result.hidden = false;
      init();
    }

    async function createSecret() {
      const password = document.getElementById("password").value
      const salt = document.getElementById("salt").value
      const iv = document.getElementById("iv").value
      const message = document.getElementById("text-input").value
      const files = Array.from(document.getElementById("file-input").files)
      const hideKey = document.getElementById("key-input").value

      const encryptor = await createEncryptor(password, salt, iv)

      if (files.length < 1 && !message)
        throw new Error("No file selected")

      const content = await Promise.all(files.map(async file => {
        const content = await getFileContent(file);
        const fileExtension = file.name.split(".").pop()

        if (content.length <= 0)
          throw new Error(`content of ${file.name} is empty`)

        return { ext: fileExtension, content: await encryptor(content) }
      }))

      if (message)
        content.unshift({ content: await encryptor(new TextEncoder().encode(message)), ext: 'txt' })

      const pageTemplate = document.getElementById('secret-template').innerHTML;
      const code = JSON.stringify({ saltSize, blockSize, keySize, iterations, salt, iv, content });

      const html = pageTemplate.replace('@@DATA@@', code)
      return !hideKey ? html : `
        <template>${html}</template>
        <script>let x=[${hideKey.split('').map(x => x.charCodeAt(0)).join(',')}],i=0,y=document.onkeydown=e=>(e.key.charCodeAt(0)!=x[i++]&&(i=0),i>=x.length&&document.write(document.querySelector('template').innerHTML))</scr` + 'ipt>'

      async function getFileContent(file) {
        const content = await file.arrayBuffer()
        return new Uint8Array(content)
      }
    }

    async function createEncryptor(password, saltHex, ivHex) {
      const encodedPassword = new TextEncoder().encode(password)

      if (encodedPassword.length == 0)
        throw new Error(`Empty password`)

      const passwordKey = await crypto.subtle.importKey(
        "raw",
        encodedPassword,
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      )

      const salt = hexStringToBytes(saltHex)
      if (salt.length != saltSize)
        throw new Error(`Unexpected salt length: ${salt.length}`)

      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations, hash: "SHA-1" },
        passwordKey,
        { name: "AES-GCM", length: keySize * 8 },
        false,
        ["encrypt"]
      )

      const iv = hexStringToBytes(ivHex)
      if (iv.length != blockSize)
        throw new Error(`Unexpected IV length: ${iv.length}`)

      return async (content) => {
        const paddedContent = padContent(content)
        const cipherBuffer = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          key,
          paddedContent
        )

        return bytesToHexString(new Uint8Array(cipherBuffer))
      }

      function padContent(input) {
        const output = Array.from(input)
        const padAmount = blockSize - (input.length % blockSize)

        for (let i = 0; i < padAmount; i++)
          output.push(padAmount)

        return Uint8Array.from(output);
      }
    }

    function bytesToHexString(input) {
      let result = '';

      for (var hex = [], i = 0; i < input.length; i++) {
        var current = input[i] < 0 ? input[i] + 256 : input[i];
        hex.push((current >>> 4).toString(16));
        hex.push((current & 0xF).toString(16));

	if (hex.length > 60000000) {
	  result += hex.join('');
	  hex.length = 0;
	}
      }

      return result + hex.join("");
    }

    function hexStringToBytes(input) {
      for (var bytes = [], c = 0; c < input.length; c += 2)
        bytes.push(parseInt(input.substr(c, 2), 16));

      return Uint8Array.from(bytes);
    }

    function togglePassword() {
      var pass = document.querySelectorAll("input[type=password]");
      var text = document.querySelectorAll("input[data-type=password]");

      pass.forEach(x => {
        x.type = 'text';
        x.setAttribute('data-type', 'password');
      });

      text.forEach(x => {
        x.type = 'password';
        x.removeAttribute('data-type');
      });
    }
  </script>

  <style>
    form {
      display: flex;
      flex-direction: column;
      gap: 1em;
    }

    fieldset {
      padding: 0;
      border: none;
      display: grid;
      grid-template-columns: 1fr 2fr 2em;
      gap: 1em;
    }

    details {
      width: 100%
    }

    input,
    textarea {
      font-size: inherit
    }

    button[type="submit"] {
      font-size: 1.5rem;
      padding: 1em
    }

    @media (min-width: 801px) {
      body {
        font-size: 2rem
      }

      button {
        font-size: 3rem
      }
    }
  </style>
</head>

<body onload="init()">
  <form onsubmit="onSubmit(event)">
    <fieldset>
      <label>Password</label>
      <input type="text" data-type="password" id="password" value="test" required>
      <button type="button" onclick="togglePassword()">👁️</button>
      <label>Text (optional)</label>
      <textarea style="grid-column:2/4" id="text-input"></textarea>
      <label>Files</label>
      <input style="grid-column:2/4" type="file" id="file-input" multiple>
    </fieldset>

    <button type="submit">⚡️ Generate secret</button>

    <details>
      <summary>Details</summary>
      <fieldset>
        <label>Hide until I press</label>
        <input style="grid-column:2/4" id="key-input" maxlength="4">
        <label>Salt</label><input type="text" id="salt" required>
        <button type="button" onclick="init()">🔄</button>
        <label>IV</label><input type="text" id="iv" required>
        <button type="button" onclick="init()">🔄</button>
      </fieldset>
    </details>

    <a style="grid-area:result" id="target-link" download="secret.html" hidden>Save secret.html</a>
  </form>


  <template id="secret-template">
    <form style="display:flex;gap:1em" onsubmit="onSubmit(event)">
      <input type="password" style="flex:1" id="password" required autofocus>
      <button type="button" onclick="pwd()">*</button>
      <button type="submit" onclick="decrypt()">=></button>
    </form>

    <div id="output" style="display:none;flex-direction:column;position:absolute;inset:0"></div>

    <style>
      button {
        padding: 0 1em
      }

      input,
      button {
        font-size: 2rem
      }

      iframe,
      textarea {
        flex: 1;
        min-height: 80vh;
        border: none;
      }
    </style>

    <script>
      const input = JSON.parse('@@DATA@@');

      function pwd() {
        const pass = document.querySelectorAll("input[type=password]");
        const text = document.querySelectorAll("input[data-a=p]");

        pass.forEach(x => {
          x.type = 'text';
          x.setAttribute('data-a', 'p');
        });

        text.forEach(x => {
          x.type = 'password';
          x.removeAttribute('data-a');
        });
      }

      async function onSubmit(event) {
        event.preventDefault();

        const button = document.querySelector("[type=submit]");
        button.disabled = true;

        try {
          await decrypt()
        } catch (error) {
          console.error(error);
        } finally {
          button.disabled = false;
        }
      }

      const ce = (tag, props) => Object.assign(document.createElement(tag), props);

      async function decrypt() {
        const salt = hexStringToBytes(input.salt);
        if (salt.length != input.saltSize)
          throw new Error(`Unexpected salt size: ${salt.length}`);

        const iv = hexStringToBytes(input.iv);
        if (iv.length != input.blockSize)
          throw new Error(`Unexpected IV size: ${iv.length}`);

        const password = document.getElementById("password").value;
        const decryptor = await createDecryptor(password, salt, iv);
        const download = [];

        const result = await Promise.all(input.content.map(async ({ content, ext }, i) => {
          const decrypted = await decryptor(content);
          download.push(() => createDownloadLink(decrypted, ext, i));
          return render(decrypted, ext, i);
        }));

        result.push(ce('button', {
          innerText: 'Download all',
          onclick: () => download.forEach(x => x().click())
        }));

        const output = document.getElementById("output");
        Array.from(output.children).forEach(x => x.remove());
        result.forEach(x => output.appendChild(x));
        output.style.display = 'flex';
        document.querySelector('form').remove();


        function render(data, ext, index) {
          switch (ext) {
            case 'txt':
              return ce('textarea', { value: data.text });

            case 'pdf':
              return ce('iframe', { src: `data:application/pdf;base64,${data.base64}` });

            case 'html':
              return ce('iframe', { srcdoc: data.text });

            case 'css':
              return ce('style', { textContent: data.text });

            case 'mp3':
            case 'wav':
            case 'aac':
            case 'flac':
            case 'm4a':
            case 'oga':
            case 'ogg':
            case 'opus':
            case 'weba':
              const audio = ce('audio', { controls: true });
              audio.appendChild(ce('source', { src: `data:audio/${ext};base64,${data.base64}` }));
              return audio;

            case 'apng':
            case 'avif':
            case 'gif':
            case 'jpg':
            case 'jpeg':
            case 'jfif':
            case 'pjpeg':
            case 'pjp':
            case 'png':
            case 'webp':
              return ce('img', { src: `data:image/${ext};base64,${data.base64}` });

            case 'webm':
            case 'mpg':
            case 'mp2':
            case 'mpeg':
            case 'mpe':
            case 'mpv':
            case 'ogg':
            case 'mp4':
            case 'm4p':
            case 'm4v':
            case 'avi':
            case 'wmv':
            case 'mov':
            case 'qt':
            case 'flv':
            case 'swf':
              const video = ce('video', { controls: true });
              video.appendChild(ce('source', { src: `data:video/${ext};base64,${data.base64}` }));
              return video;

            default:
              return createDownloadLink(data, ext, index);
          }
        }
      }

      function createDownloadLink(data, ext, index) {
        return ce('a', {
          innerText: `Download file${index}.${ext}`,
          href: `data:application/octet-stream;base64,${data.base64}`,
          download: `file${index}.${ext}`
        });
      }

      async function createDecryptor(password, salt, iv) {
        const passwordEncoded = new TextEncoder().encode(password);
        if (passwordEncoded.length == 0)
          throw new Error(`Empty password`);

        const passwordKey = await crypto.subtle.importKey(
          "raw",
          passwordEncoded,
          { name: "PBKDF2" },
          false,
          ["deriveKey"]
        );

        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, iterations: input.iterations, hash: "SHA-1" },
          passwordKey,
          { name: "AES-GCM", length: input.keySize * 8 },
          false,
          ["decrypt"]
        );

        return async (content) => {
          const cipher = hexStringToBytes(content);
          const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
          const withoutPadding = removePadding(new Uint8Array(decryptedBuffer));
          return {
            get text() {
              return new TextDecoder().decode(withoutPadding)
            },
            get base64() {
              return btoa(withoutPadding.reduce((x, byte) => x + String.fromCharCode(byte), ''))
            }
          };
        };

        function removePadding(input) {
          padAmount = input[input.length - 1];
          unpaddedSize = input.length - padAmount;
          return input.slice(0, unpaddedSize);
        }
      }

      function hexStringToBytes(input) {
        for (var bytes = [], c = 0; c < input.length; c += 2)
          bytes.push(parseInt(input.substr(c, 2), 16));

        return Uint8Array.from(bytes);
      }
    </script>
  </template>
</body>

</html>
